     “Whosoever reads [the Torah] without melody and studies [Mishnah] without song, to him may be applied the verse (Ezekiel 20:25): ‘Moreover I gave them laws that were not good, and rules by which they could not live”‘ (B. Megillah 32a).

     The soldiers are demanding that the military command stop sending them “singers” — “entertainers” — who only scramble their heads with frivolous talk, empty content-free material designed to keep them from thinking about anything that actually has content. They demand instead that people be sent to speak with them about things of substance — and speak in a way that makes a deep impression: so that even after the speaker has gone his way, the effect remains with the listener.
     As the Rebbe put it in a different context, in order to lift the soldiers’ spirits, the military leadership “brings them singers from New York and London to distract them.”
